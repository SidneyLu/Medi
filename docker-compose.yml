services:
  postgres:
    image: postgres:16-alpine
    container_name: edbuy-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: edbuy-chromadb
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: edbuy-api
    env_file:
      - .env
    environment:
      PYTHONPATH: /workspace/api
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./api:/workspace/api
      - ./data:/workspace/data
      - ./infra:/workspace/infra
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: edbuy-worker
    env_file:
      - .env
    environment:
      PYTHONPATH: /workspace/api
    volumes:
      - ./api:/workspace/api
      - ./worker:/workspace/worker
      - ./data:/workspace/data
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python /workspace/worker/runner.py healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: edbuy-frontend
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/products || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 8

volumes:
  postgres_data:
  chroma_data:
